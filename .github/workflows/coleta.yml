name: Coleta Cartola FC

on:
  schedule:
    # Cobertura diária (6 runs/dia): 1 na madrugada, 1 de manhã e o
    # restante concentrado na tarde/noite, quando acontecem os jogos.
    - cron: "0 5 * * *"     # 02h BRT — madrugada
    - cron: "0 14 * * *"    # 11h BRT — manhã
    - cron: "0 19 * * *"    # 16h BRT — tarde
    - cron: "30 21 * * *"   # 18h30 BRT — início dos jogos
    - cron: "30 23 * * *"   # 20h30 BRT — jogos da noite
    - cron: "30 1 * * *"    # 22h30 BRT — jogo noturno

    # Reforço de fim de semana (+2, total 8) — sáb e dom têm a maioria
    # dos jogos do Brasileirão. Cobre janelas de jogo com dados frescos.
    - cron: "0 20 * * 6,0"  # 17h BRT sáb/dom — durante primeiro jogo
    - cron: "30 0 * * 0,1"  # 21h30 BRT sáb/dom — durante jogo noturno

  workflow_dispatch:

jobs:
  coletar:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install requests pandas numpy google-auth google-auth-httplib2 google-api-python-client

      - name: Rodar extracao
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
        run: python cartola_extractor.py

      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A docs/data/ llm/
          git diff --cached --quiet || git commit -m "dados: coleta automatica $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push

      - name: Agendar fechamento no Google Calendar
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          HORAS_ANTES_LEMBRETE: "3"
          MERCADO_STATUS_CSV: "docs/data/current/status.csv"
        run: python agendaFechamentomercado.py

      - name: Trigger Deploy Pages
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'pages.yml',
              ref: 'main'
            })