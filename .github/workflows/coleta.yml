name: Coleta Cartola FC

on:
  schedule:
    # Cobertura diária (10 runs/dia)
    - cron: "0 7 * * *"     # 04h BRT — madrugada
    - cron: "0 9 * * *"     # 06h BRT
    - cron: "0 13 * * *"    # 10h BRT
    - cron: "40 15 * * *"   # 12h40 BRT
    - cron: "0 18 * * *"    # 15h BRT
    - cron: "0 20 * * *"    # 17h BRT
    - cron: "30 21 * * *"   # 18h30 BRT
    - cron: "0 23 * * *"    # 20h BRT
    - cron: "30 0 * * *"    # 21h30 BRT
    - cron: "0 2 * * *"     # 23h BRT

    # Reforço de fim de semana — sáb e dom têm a maioria dos jogos do
    # Brasileirão. Preenche os gaps de 2h+ e cobre os horários de jogo
    # (16h30, 18h30, 21h) com dados mais frescos no dashboard.
    - cron: "0 15 * * 6,0"  # 12h BRT sáb/dom — preenche gap 10h→12h40
    - cron: "0 17 * * 6,0"  # 14h BRT sáb/dom — preenche gap 12h40→15h
    - cron: "0 19 * * 6,0"  # 16h BRT sáb/dom — durante primeiro jogo
    - cron: "0 1 * * 0,1"   # 22h BRT sáb/dom — durante jogo noturno

  workflow_dispatch:

jobs:
  coletar:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install requests pandas numpy google-auth google-auth-httplib2 google-api-python-client

      - name: Rodar extracao
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
        run: python cartola_extractor.py

      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A docs/data/ llm/
          git diff --cached --quiet || git commit -m "dados: coleta automatica $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push

      - name: Agendar fechamento no Google Calendar
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          HORAS_ANTES_LEMBRETE: "3"
          MERCADO_STATUS_CSV: "docs/data/current/status.csv"
        run: python agendaFechamentomercado.py

      - name: Trigger Deploy Pages
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'pages.yml',
              ref: 'main'
            })